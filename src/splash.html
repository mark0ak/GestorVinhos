<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            background-color: #111827; /* Fundo escuro */
            color: #f3f4f6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            /* Evita que o utilizador selecione o texto enquanto espera */
            user-select: none; 
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #10b981; /* Verde esmeralda da sua app */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        h2 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin: 0;
        }
        p {
            font-size: 0.8rem;
            color: #9ca3af;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h2>Solar D Manuel I</h2>
    <p>A organizar a adega...</p>
</body>
</html>
